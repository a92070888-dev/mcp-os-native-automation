name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install deps
      run: |
        pip install pywinauto pywin32 pytest pytest-cov flake8
    - name: Lint
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test
      run: pytest tests/ -v --cov=. --cov-report=term-missing
