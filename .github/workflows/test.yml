name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install deps
      run: pip install pywinauto pywin32 mcp pytest flake8
    - name: Lint
      run: flake8 server.py --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test
      run: pytest tests/ -v
